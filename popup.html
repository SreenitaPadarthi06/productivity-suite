<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Productivity Suite</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      width: 320px;
      padding: 12px;
    }
    h2 { margin-top: 0; }
    button {
      margin: 6px 0;
      padding: 8px;
      width: 100%;
      cursor: pointer;
    }
    textarea {
      width: 100%;
      height: 90px;
      margin-top: 8px;
      resize: vertical;
    }
    .session-item {
      margin: 6px 0;
      border: 1px solid #ddd;
      padding: 6px;
    }
  </style>
</head>
<body>

  <h2>Productivity Suite</h2>

  <button data-testid="save-session-btn">Save Current Session</button>

  <div data-testid="sessions-list"></div>

  <textarea
    data-testid="notes-textarea"
    placeholder="Write notes here..."></textarea>

  <button data-testid="save-notes-btn">Save Notes</button>

  <button data-testid="open-options-btn">Open Options</button>

  <script src="popup.js"></script>
</body>
</html>
